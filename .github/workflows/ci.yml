# QNet CI/CD Pipeline

name: QNet CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run Ruff linter
        run: |
          ruff check qnet/
      
      - name: Run Black check
        run: |
          black --check qnet/
      
      - name: Run MyPy type check
        run: |
          mypy qnet/ --ignore-missing-imports

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -e .
      
      - name: Run tests
        run: |
          pytest tests/ -v --cov=qnet --cov-report=xml --cov-report=html
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker build -t qnet/api:latest -f docker/Dockerfile .
      
      - name: Build frontend
        run: |
          docker build -t qnet/frontend:latest -f docker/Dockerfile.frontend .
      
      - name: Run container
        run: |
          docker run -d --name qnet-test -p 8000:8000 qnet/api:latest
          sleep 5
          docker logs qnet-test
      
      - name: Stop container
        if: always()
        run: |
          docker stop qnet-test || true
          docker rm qnet-test || true

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      
      - name: Run benchmarks
        run: |
          python -c "
            from qnet.cli.commands import main
            import sys
            sys.argv = ['qnet', 'benchmark']
            main()
          "

  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check documentation files
        run: |
          ls -la docs/
          test -f docs/rfc-qnet-001.md
          test -f docs/architecture.md
      
      - name: Validate README
        run: |
          test -f README.md
          grep -q "QNet" README.md
          grep -q "## Features" README.md

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install safety
        run: pip install safety
      
      - name: Run security scan
        run: |
          safety check --json || true

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint, test, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push
        run: |
          docker build -t ghcr.io/${{ github.repository }}/qnet:latest -f docker/Dockerfile .
          docker push ghcr.io/${{ github.repository }}/qnet:latest
