version: '3.8'

services:
  # QNet API Server
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: qnet-api
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=qnet
      - POSTGRES_USER=qnet
      - POSTGRES_PASSWORD=qnet_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    depends_on:
      - postgres
      - redis
    networks:
      - qnet-network
    volumes:
      - ./config:/app/config
      - qnet-data:/app/data

  # QNet Frontend Dashboard
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: qnet-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NEXT_PUBLIC_WS_URL=ws://api:8001
    depends_on:
      - api
    networks:
      - qnet-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: qnet-postgres
    environment:
      - POSTGRES_DB=qnet
      - POSTGRES_USER=qnet
      - POSTGRES_PASSWORD=qnet_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - qnet-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: qnet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - qnet-network

networks:
  qnet-network:
    driver: bridge

volumes:
  qnet-data:
  postgres-data:
  redis-data:
